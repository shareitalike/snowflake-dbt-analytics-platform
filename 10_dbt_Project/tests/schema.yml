version: 2

# This file configures tests across our Marts models, demonstrating
# Native Tests, Generic Custom Tests, and dbt-expectations.

models:
  - name: fct_sales
    columns:
      - name: sales_sk
        tests:
          # Native dbt tests
          - not_null:
              severity: error
          - unique:
              severity: error
      
      - name: customer_sk
        tests:
          # Native relationship test enforcing referential integrity
          - relationships:
              to: ref('dim_customer')
              field: customer_sk
              severity: error
              
      - name: net_revenue
        tests:
          # Custom generic test we wrote in tests/generic/test_is_positive.sql
          - is_positive:
              severity: error
          
          # dbt-expectations: Complex statistical bounds testing
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 100000
              row_condition: "degenerate_order_id is not null"
              severity: warn

  - name: dim_customer
    columns:
      - name: customer_segment
        tests:
          # Native accepted values
          - accepted_values:
              values: ['VIP', 'Active', 'Occasional', 'UNKNOWN']
              severity: error

          # dbt-expectations: String length bounds
          - dbt_expectations.expect_column_value_lengths_to_be_between:
              min_value: 3
              max_value: 15

      - name: email_address
        tests:
          # dbt-expectations: Regex matching
          - dbt_expectations.expect_column_values_to_match_regex:
              regex: "^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}$"
              # Warning severity because bad emails shouldn't halt the whole pipeline
              severity: warn 
