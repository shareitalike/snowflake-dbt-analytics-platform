version: 2

sources:
  - name: oracle_erp
    database: "{{ var('raw_database') }}"
    schema: SC_ORACLE_ERP
    description: "On-prem ERP synchronization via CDC."
    tags: ["domain:erp", "layer:bronze"]
    loaded_at_field: metadata_inserted_at
    freshness:
      warn_after: {count: 12, period: hour}
      error_after: {count: 24, period: hour}
    tables:
      - name: raw_inventory
        columns:
          - name: sku_id
            tests:
              - not_null
          - name: warehouse_id
            tests:
              - not_null

      - name: raw_suppliers
        columns:
          - name: supplier_id
            tests:
              - unique
              - not_null

  - name: pos_systems
    database: "{{ var('raw_database') }}"
    schema: SC_POS
    description: "Physical retail point-of-sale systems."
    tags: ["domain:retail", "layer:bronze"]
    tables:
      - name: raw_store_transactions
        columns:
          - name: receipt_id
            tests:
              - unique
              - not_null

  - name: salesforce
    database: "{{ var('raw_database') }}"
    schema: SC_SALESFORCE
    description: "CRM data for B2B sales and Marketing."
    tags: ["domain:marketing", "layer:bronze"]
    tables:
      - name: raw_accounts
      - name: raw_leads
