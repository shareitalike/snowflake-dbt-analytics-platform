version: 2

models:
  - name: stg_orders
    description: "Standardized staging view for Shopify Orders."
    config:
      meta:
        owner: "@data_engineering"
        layer: "staging"
        downstream_dependencies: ["fct_orders"]
        upstream_dependencies: ["source:shopify.raw_orders"]
        materialization: "view (Zero-copy, pushes compute to source table)"
        performance: "No clustering needed at view level. Relies on micro-partitions of raw_orders."
    columns:
      - name: order_id
        description: "Unique identifier for the order."
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "Foreign key to the customer."
        tests:
          - not_null
      - name: order_status
        description: "Current status of the order."
        tests:
          - accepted_values:
              arguments:
                values: ['open', 'closed', 'cancelled', 'pending']
      - name: created_at_utc
        description: "Order creation timestamp in UTC."

  - name: stg_customers
    description: "Standardized staging view for Shopify Customers."
    config:
      meta:
        owner: "@data_engineering"
        layer: "staging"
        downstream_dependencies: ["dim_customers"]
        upstream_dependencies: ["source:shopify.raw_customers"]
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: email_address
        description: "Customer email (PII)."
        tests:
          - not_null

  - name: stg_payments
    description: "Standardized staging view for Stripe Payments."
    config:
      meta:
        owner: "@finance_engineering"
        layer: "staging"
        downstream_dependencies: ["fct_payments"]
        upstream_dependencies: ["source:stripe.raw_charges"]
    columns:
      - name: payment_id
        tests:
          - unique
          - not_null
      - name: payment_amount
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 1000000
