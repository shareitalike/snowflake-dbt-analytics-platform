version: 2

models:
  - name: fct_sales
    description: "Transaction Fact Table capturing line-item sales metrics."
    config:
      meta:
        owner: "@data_engineering"
        layer: "marts"
        downstream_dependencies: ["Power BI Sales Dashboard"]
        upstream_dependencies: ["int_orders_enriched"]
        materialization: "incremental (MERGE)"
        expected_row_counts: ">100M / year"
        refresh_frequency: "Hourly"
        cluster_keys: "date_sk"
    columns:
      - name: sales_sk
        tests:
          - unique:
              config:
                severity: error
          - not_null:
              config:
                severity: error
      - name: date_sk
        tests:
          - not_null
      - name: customer_sk
        tests:
          - not_null
          - relationships:
              config:
                severity: error
              arguments:
                to: ref('dim_customer')
                field: customer_sk
      - name: net_revenue
        tests:
          - not_null
          - is_positive:
              config:
                severity: error
          - dbt_expectations.expect_column_values_to_be_between:
              config:
                severity: warn
              arguments:
                min_value: 0
                max_value: 100000
                row_condition: "degenerate_order_id is not null"

  - name: fct_orders
    description: "Accumulating Snapshot Fact capturing overarching Order headers and milestones."
    config:
      meta:
        owner: "@data_engineering"
        layer: "marts"
        downstream_dependencies: ["Power BI Fulfillment Dashboard"]
        upstream_dependencies: ["int_orders_enriched"]
        materialization: "incremental (MERGE)"
        expected_row_counts: ">30M / year"
        refresh_frequency: "15-minute micro-batch"
        cluster_keys: "date_sk"
    columns:
      - name: order_sk
        tests:
          - unique
          - not_null
      - name: order_status
        tests:
          - accepted_values:
              arguments:
                values: ['open', 'closed', 'cancelled', 'pending']
