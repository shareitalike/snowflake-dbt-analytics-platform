name: Enterprise Airflow CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  code-validation:
    name: Lint & Test DAGs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r 11_Airflow_Orchestration/requirements.txt
          pip install pytest flake8 black safety pylint

      - name: Dependency Checking (Safety)
        run: |
          safety check -r 11_Airflow_Orchestration/requirements.txt --full-report

      - name: Lint Code & Static Analysis
        run: |
          black --check 11_Airflow_Orchestration/
          flake8 11_Airflow_Orchestration/ --max-line-length=100
          pylint --disable=all --enable=E,F,W 11_Airflow_Orchestration/dags/

      - name: Run DAG Integrity Tests (Pytest)
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/11_Airflow_Orchestration
          pytest 11_Airflow_Orchestration/tests/test_dag_integrity.py -v

  deploy-to-dev:
    name: Deploy to Dev (AWS MWAA)
    needs: code-validation
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Sync DAGs to S3 (Dev)
        run: |
          aws s3 sync 11_Airflow_Orchestration/dags s3://omniretail-airflow-dev-bucket/dags --delete
          aws s3 sync 11_Airflow_Orchestration/plugins s3://omniretail-airflow-dev-bucket/plugins --delete

  deploy-to-prod:
    name: Deploy to Prod (AWS MWAA)
    needs: code-validation
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: 
      name: Production
      url: https://airflow.omniretail.com
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-region: us-east-1

      - name: Sync DAGs to S3 (Prod)
        run: |
          aws s3 sync 11_Airflow_Orchestration/dags s3://omniretail-airflow-prod-bucket/dags --delete
          aws s3 sync 11_Airflow_Orchestration/plugins s3://omniretail-airflow-prod-bucket/plugins --delete
          aws s3 cp 11_Airflow_Orchestration/requirements.txt s3://omniretail-airflow-prod-bucket/requirements.txt
